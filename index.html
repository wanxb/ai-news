<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI News · Timeline</title>
<style>
  * { box-sizing:border-box; }
  body { margin:0; font-family:-apple-system,"Segoe UI","Microsoft YaHei",sans-serif; background:#eef0f4; color:#1f2329; height:100vh; display:flex; flex-direction:column; overflow:hidden; }
  header { background:#1f2329; color:#fff; padding:14px 24px; display:flex; align-items:center; gap:12px; flex-shrink:0; }
  header h1 { font-size:18px; margin:0; font-weight:600; }
  header .tag { font-size:12px; color:#aab0ba; }
  .layout { flex:1; display:flex; min-height:0; }
  /* timeline */
  .timeline { width:240px; flex-shrink:0; background:#f7f8fa; border-right:1px solid #e2e5ea; overflow-y:auto; padding:20px 0 20px 0; }
  .tl-item { position:relative; padding:12px 20px 12px 48px; cursor:pointer; transition:background .15s; }
  .tl-item:hover { background:#eceef2; }
  .tl-item.active { background:#e7effe; }
  .tl-item::before { content:""; position:absolute; left:23px; top:0; bottom:0; width:2px; background:#d4d8df; }
  .tl-item:first-child::before { top:18px; }
  .tl-item:last-child::before { bottom:calc(100% - 18px); }
  .tl-dot { position:absolute; left:17px; top:15px; width:14px; height:14px; border-radius:50%; background:#fff; border:3px solid #b6bcc6; z-index:1; transition:border-color .15s; }
  .tl-item.active .tl-dot { border-color:#1a56db; background:#1a56db; }
  .tl-date { font-size:15px; font-weight:600; }
  .tl-week { font-size:12px; color:#9aa0aa; margin-top:2px; }
  .tl-item.active .tl-date { color:#1a56db; }
  /* content */
  .content { flex:1; min-width:0; background:#fff; }
  .content iframe { width:100%; height:100%; border:none; }
  .empty { padding:60px; text-align:center; color:#9aa0aa; }
  @media (max-width:640px){
    .layout{flex-direction:column;} .timeline{width:100%;height:160px;border-right:none;border-bottom:1px solid #e2e5ea;}
  }
</style>
</head>
<body>
<header>
  <h1>📰 AI News</h1>
  <span class="tag">Anthropic · OpenAI · Gemini ｜ Timeline</span>
</header>
<div class="layout">
  <nav class="timeline" id="timeline"></nav>
  <main class="content"><iframe id="viewer" title="Daily content"></iframe></main>
</div>
<script>
  // The daily task rewrites this array each run: newest first.
  // All reports live under Archive/ and are named by date: Archive/YYYY-MM-DD.html
  const DAYS = [
    { date: "2026-07-01", path: "Archive/2026-07-01.html" },
    { date: "2026-06-29", path: "Archive/2026-06-29.html" },
    { date: "2026-06-26", path: "Archive/2026-06-26.html" },
    { date: "2026-06-25", path: "Archive/2026-06-25.html" },
    { date: "2026-06-24", path: "Archive/2026-06-24.html" },
    { date: "2026-06-23", path: "Archive/2026-06-23.html" }
  ];

  const WK = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  const MON = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  function weekday(d){ const [y,m,da]=d.split("-").map(Number); return WK[new Date(y,m-1,da).getDay()]; }
  function label(d){ const [y,m,da]=d.split("-").map(Number); return MON[m-1]+" "+da; }

  const tl = document.getElementById("timeline");
  const viewer = document.getElementById("viewer");

  if (!DAYS.length){
    tl.innerHTML = '<div class="empty">No content yet</div>';
  } else {
    DAYS.forEach((d,i)=>{
      const el = document.createElement("div");
      el.className = "tl-item" + (i===0?" active":"");
      el.innerHTML = '<span class="tl-dot"></span>'+
        '<div class="tl-date">'+label(d.date)+'</div>'+
        '<div class="tl-week">'+d.date+' · '+weekday(d.date)+'</div>';
      el.onclick = ()=>{
        document.querySelectorAll(".tl-item").forEach(x=>x.classList.remove("active"));
        el.classList.add("active");
        viewer.src = d.path;
      };
      tl.appendChild(el);
    });
    viewer.src = DAYS[0].path; // show the latest day by default
  }
</script>
</body>
</html>
