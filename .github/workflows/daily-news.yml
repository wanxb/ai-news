name: Daily AI News

on:
  # ── Scheduled: daily at 07:00 China time (23:00 UTC previous day) ──
  schedule:
    - cron: '0 23 * * *'

  # ── Manual trigger from GitHub Actions tab ──
  workflow_dispatch:
    inputs:
      date:
        description: 'Date to run for (YYYY-MM-DD, empty = today)'
        required: false
        type: string
      dry_run:
        description: 'Preview without writing files'
        required: false
        type: boolean
        default: false

  # ── Auto-run when push includes scripts/ changes (useful for testing) ──
  push:
    branches: [main]
    paths:
      - 'scripts/fetch_news.py'
      - '.github/workflows/daily-news.yml'

# ── Permissions ────────────────────────────────────────────────────────────
permissions:
  contents: write

# ── Concurrency: only one daily run at a time ──────────────────────────────
concurrency:
  group: ai-news-daily
  cancel-in-progress: false

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Setup Python ──────────────────────────────────────────────
      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt

      # ── 3. Run the scraper ────────────────────────────────────────────
      - name: Fetch news and generate report
        id: scraper
        run: |
          if [ "${{ github.event_name == 'workflow_dispatch' && inputs.date != '' }}" = "true" ]; then
            DATE_ARGS="--date ${{ inputs.date }}"
          else
            DATE_ARGS=""
          fi

          if [ "${{ github.event_name == 'workflow_dispatch' && inputs.dry_run == 'true' }}" = "true" ]; then
            DATE_ARGS="$DATE_ARGS --dry-run"
          fi

          python scripts/fetch_news.py $DATE_ARGS 2>&1 | tee scrape_output.log

          # Check if report was actually generated
          if grep -q "Report written:" scrape_output.log; then
            echo "report_generated=true" >> "$GITHUB_OUTPUT"
          else
            echo "report_generated=false" >> "$GITHUB_OUTPUT"
            echo "No new content — skipping commit & deploy."
          fi

        shell: bash

      # ── 4. Commit changes (if report generated) ──────────────────────
      - name: Commit report and timeline update
        if: steps.scraper.outputs.report_generated == 'true'
        run: |
          git config user.name "AI News Bot"
          git config user.email "ai-news-bot@users.noreply.github.com"

          git add Archive/ index.html

          # Check if there's actually something to commit
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "🤖 Daily AI News report $(date +'%Y-%m-%d')

            Auto-generated by fetch_news.py

            Co-Authored-By: Claude <noreply@anthropic.com>"
            git push
          fi

        shell: bash

      # ── 5. Deploy to Cloudflare Pages ─────────────────────────────────
      - name: Deploy to Cloudflare Pages
        if: steps.scraper.outputs.report_generated == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy . --project-name ai-news
